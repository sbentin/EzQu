                            appendNode('artifactId', artifact)
                            appendNode('version', '9.7.1')
                        }
                    }
                }
            }
        }
        
        // “extension” publication – the JAR that contains the byte‑code builders
        ant(MavenPublication) {
            artifactId = 'ezqu-ant-plugin'
            version   = project.version

            artifact tasks.antJar

            pom {
                name.set('ezqu‑ant-plugin')
                description.set('Ant plugin for ezqu entity post‑compilation byte‑code.')
                url.set('https://github.com/centimia/ezqu')     // adjust
                licenses {
                    license {
                        name.set('Eclipse Public License v1.0')
