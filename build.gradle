buildscript {
	repositories {
		mavenCentral()
	}
	
	dependencies {
		classpath 'org.apache.maven:maven-core:3.9.12'
		classpath 'org.apache.maven.plugin-tools:maven-plugin-tools-annotations:3.15.2' // maven-plugin-annotations
    	classpath 'org.apache.maven.plugin-tools:maven-plugin-tools-generators:3.15.2'
	}
}
plugins {
    id 'java-library'
    id 'eclipse'
    id 'maven-publish'
    id 'org.jreleaser' version '1.21.0'
}

sourceCompatibility = '21'
targetCompatibility = '21'
[compileJava, compileTestJava]*.options*.encoding = 'UTF-8'
group = 'com.centimia'
version   = "${mainJarVersion}"

dependencies {
	implementation 'com.centimia:ccoreException:1.0.2'
	
	compileOnly 'javax.transaction:javax.transaction-api:1.3'
	compileOnly 'org.slf4j:slf4j-api:2.0.16'
	compileOnly 'org.ow2.asm:asm:9.7.1'
	compileOnly 'org.ow2.asm:asm-commons:9.7.1'
	compileOnly 'org.ow2.asm:asm-util:9.7.1'
	compileOnly 'org.apache.ant:ant:1.10.15'
	
	compileOnly gradleApi()
    
    compileOnly 'org.apache.maven:maven-plugin-api:3.9.12'    
    compileOnly 'org.apache.maven.plugin-tools:maven-plugin-tools-annotations:3.15.2' // maven-plugin-annotations
    // implementation 'org.apache.maven.plugin-tools:maven-plugin-tools-generators:3.15.2'
    // implementation 'org.apache.maven:maven-core:3.9.12'
    // annotationProcessor 'org.apache.maven.plugin-tools:maven-plugin-tools-annotations:3.15.2'
}

javadoc {
    options.addStringOption('encoding', 'UTF-8')
    options.bottom = "Copyright (c) 2025-2030 Shai Bentin & Centimia Inc.."
}

repositories {
	mavenCentral()
	maven {
        url "${artifactory_contextUrl}/libs-release-local"
        credentials {
            username = "${artifactory_user}"
            password = "${artifactory_password}"
        }
    }
}

sourceSets {
    main {
        java {            
            srcDirs = ['src/main/core', 'src/main/ext', 'src/main/resources']
        }
    }
}

import org.apache.maven.tools.plugin.PluginToolsRequest
import org.apache.maven.tools.plugin.generator.PluginDescriptorFilesGenerator
import org.apache.maven.tools.plugin.DefaultPluginToolsRequest
import org.apache.maven.plugin.descriptor.PluginDescriptor
import org.apache.maven.project.MavenProject
import org.apache.maven.model.Build
import org.apache.maven.plugin.descriptor.MojoDescriptor
import org.codehaus.plexus.component.repository.ComponentDependency

tasks.register('mavenPlugin') {
    group = 'build'
    description = 'Generates Maven plugin descriptor (plugin.xml) from @Mojo classes'

    dependsOn tasks.compileJava

    doLast {
    	def build = new Build()
    	build.setDirectory("$buildDir/classes/java/main")
    	build.setSourceDirectory('src/ext/java')
    	
		def project = new MavenProject()
		project.setGroupId('com.centimia')
		project.setArtifactId('ezqu-maven-plugin')
		project.setVersion("$mainJarVersion")
		project.addCompileSourceRoot('src/main/ext')
		project.setBuild(build)
		
        // Step 2: create a PluginDescriptor
		def descriptor = new PluginDescriptor()
		descriptor.setGroupId(project.groupId)
		descriptor.setArtifactId(project.artifactId)
		descriptor.setVersion(project.version)
		descriptor.setGoalPrefix('ezqu')
		descriptor.setName("ezqu-maven-plugin")
		descriptor.setDescription("Executes post-compile tasks for EzQu")
		descriptor.setIsolatedRealm(false)
		descriptor.setInheritedByDefault(true)

		def mojo = new MojoDescriptor()
		mojo.setImplementation("com.centimia.orm.ezqu.ext.maven.PostCompileMojo") // fully qualified class
		mojo.setGoal("ezqu")
		mojo.setLanguage("java")
		mojo.setDescription("Executes post-compile tasks for EzQu")
		mojo.setPhase("process-classes") // optional
		descriptor.addMojo(mojo)

		def asm = new ComponentDependency()
		asm.setGroupId("org.ow2.asm")
		asm.setArtifactId("asm")
		asm.setVersion("9.7.1")

		def asmCommons = new ComponentDependency()
		asmCommons.setGroupId("org.ow2.asm")
		asmCommons.setArtifactId("asm-commons")
		asmCommons.setVersion("9.7.1")
		
		def asmUtil = new ComponentDependency()
		asmUtil.setGroupId("org.ow2.asm")
		asmUtil.setArtifactId("asm-util")
		asmUtil.setVersion("9.7.1")
		
		descriptor.addDependency(asm)
		descriptor.addDependency(asmCommons)
		descriptor.addDependency(asmUtil)
		
		//def classesDir = file("$buildDir/classes/java/main")
		def outputDir = file("$buildDir/resources/main/META-INF/maven")

        outputDir.mkdirs()

        def request = new DefaultPluginToolsRequest(project, descriptor)
        request.setEncoding('UTF-8')

        def generator = new PluginDescriptorFilesGenerator()
        generator.execute(outputDir, request)

        println "plugin.xml generated at: ${outputDir}/META-INF/maven/plugin.xml"
    }
}

tasks.register('binJar', Jar) {
	dependsOn tasks.named('mavenPlugin')
	
    from sourceSets.main.output
    exclude 'com/centimia/orm/ezqu/ext*', 'META-INF/*', 'plugin-enhanced.xml'
    archiveBaseName.set('ezqu')   // keep the original artifactId
    archiveVersion.set("${mainJarVersion}")
}

tasks.register('gradleJar', Jar) {
    from sourceSets.main.output
    include 'com/centimia/orm/ezqu/ext/common/**', 'com/centimia/orm/ezqu/ext/asm/**', 'com/centimia/orm/ezqu/ext/gradle/**', 'META-INF/gradle-plugins/**'
    archiveBaseName.set('ezqu-gradle-plugin')
    archiveClassifier.set('')     // “extension” JAR has no classifier
    archiveVersion.set("${extJarVersion}")
}

tasks.register('mavenJar', Jar) {
    from sourceSets.main.output
    include 'com/centimia/orm/ezqu/ext/common/**', 'com/centimia/orm/ezqu/ext/asm/**', 'com/centimia/orm/ezqu/ext/maven/**', 'META-INF/maven/**', 'plugin-enhanced.xml'
    archiveBaseName.set('ezqu-maven-plugin')
    archiveClassifier.set('')     // “extension” JAR has no classifier
    archiveVersion.set("${extJarVersion}")
}

tasks.register('antJar', Jar) {	
    from sourceSets.main.output
    include 'com/centimia/orm/ezqu/ext/common/**', 'com/centimia/orm/ezqu/ext/asm/**', 'com/centimia/orm/ezqu/ext/ant/**'
    archiveBaseName.set('ezqu-ant-plugin')
    archiveClassifier.set('')     // “extension” JAR has no classifier
    archiveVersion.set("${extJarVersion}")
}

tasks.register('extJar', Jar) {	
    from sourceSets.main.output
    include 'com/centimia/orm/ezqu/ext/common/**', 'com/centimia/orm/ezqu/ext/asm/**'
    archiveBaseName.set('ezqu-ext')
    archiveClassifier.set('')     // “extension” JAR has no classifier
    archiveVersion.set("${extJarVersion}")
}

// Sources jar (the Java‑library plugin already creates one)
tasks.register('sourceJar', Jar) {
    archiveClassifier.set('sources')
    from sourceSets.main.allJava
    exclude 'com/centimia/orm/ezqu/ext*', 'META-INF/*'
    archiveBaseName.set('ezqu')
    archiveClassifier.set('sources')
    archiveVersion.set("${extJarVersion}")
}
	
publishing {
	publications {
		binary(MavenPublication) {
			artifactId = 'ezqu'
            version   = project.version
            
            // Use the “jar” task you created
            artifact tasks.binJar
			artifact tasks.sourceJar
			
            // POM – the DSL is easier than the raw XML approach
            pom {
                name.set('ezqu')
                description.set('EzQu is an O/R Mapping tool and a JDBC wrapping framework.')
                url.set('https://github.com/centimia/ezqu')     // adjust
                licenses {
                    license {
                        name.set('Eclipse Public License v1.0')
                        url.set('https://www.eclipse.org/legal/epl-v10.html')
                    }
                    license {
                        name.set('H2 License v1.0')
                        url.set('http://h2database.com/html/license.html')
                    }
                }
                developers {
                    developer {
                        id.set('centimia')
                        name.set('Centimia')
                        email.set('info@centimia.com')
                    }
                }
                scm {
                	connection = 'scm:git:https://scm.centimia.com/scm/repo/shai/EzQu.git'
                    developerConnection = 'https://scm.centimia.com/scm/repo/shai/EzQu.git'
                    url = 'https://scm.centimia.com/scm/repo/shai/EzQu'
                }
                
                // --- add dependencies ---
                withXml {
                    def dependenciesNode = asNode().appendNode('dependencies')

                    dependenciesNode.appendNode('dependency').with {
                        appendNode('groupId', 'com.centimia')
                        appendNode('artifactId', 'ccoreException')
                        appendNode('version', '1.0.2')
                    }
                }
            }
        }
		
		// “extension” publication – the JAR that contains the byte‑code builders
        ext(MavenPublication) {
        	artifactId = 'ezqu-ext'
            version   = project.version
            
            artifact tasks.extJar
			
            pom {
                name.set('ezqu-ext')
                description.set('Library for ezqu entity post‑compilation byte‑code builders. Used for ide plugins')
                url.set('https://github.com/centimia/ezqu')     // adjust
                licenses {
