                        name.set('Eclipse Public License v1.0')
                        url.set('https://www.eclipse.org/legal/epl-v10.html')
                    }
                }
                developers {
                    developer {
                        id.set('centimia')
                        name.set('Centimia')
                        email.set('shai@centimia.com')
                    }
                }
                scm {
                	connection = 'scm:git:https://scm.centimia.com/scm/repo/shai/EzQu.git'
                    developerConnection = 'https://scm.centimia.com/scm/repo/shai/EzQu.git'
                    url = 'https://scm.centimia.com/scm/repo/shai/EzQu'
                }
            }
        }
		
		// “extension” publication – the JAR that contains the byte‑code builders
        gradle(MavenPublication) {
            // from components.java
            artifactId = 'ezqu-gradle-plugin'
            version   = project.version

            artifact tasks.gradleJar

            pom {
                name.set('ezqu‑gradle-plugin')
                description.set('Gradle plugin for ezqu entity post‑compilation byte‑code.')
                url.set('https://github.com/centimia/ezqu')     // adjust
                licenses {
                    license {
                        name.set('Eclipse Public License v1.0')
                        url.set('https://www.eclipse.org/legal/epl-v10.html')
                    }
                }
                developers {
                    developer {
                        id.set('centimia')
                        name.set('Centimia')
                        email.set('shai@centimia.com')
                    }
                }
                scm {
                	connection = 'scm:git:https://scm.centimia.com/scm/repo/shai/EzQu.git'
                    developerConnection = 'https://scm.centimia.com/scm/repo/shai/EzQu.git'
                    url = 'https://scm.centimia.com/scm/repo/shai/EzQu'
                }
                
                // --- add dependencies ---
                withXml {
                    def dependenciesNode = asNode().appendNode('dependencies')

                    // Example: ASM runtime dependencies
                    ['asm', 'asm-commons', 'asm-util'].each { artifact ->
                        dependenciesNode.appendNode('dependency').with {
                            appendNode('groupId', 'org.ow2.asm')
                            appendNode('artifactId', artifact)
                            appendNode('version', '9.7.1')
                        }
                    }
                }
            }
        }
        
        // “extension” publication – the JAR that contains the byte‑code builders
        maven(MavenPublication) {
            artifactId = 'ezqu-maven-plugin'
            version   = project.version

            artifact tasks.mavenJar

            pom {
                name.set('ezqu‑maven-plugin')
